<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Southease River Tide</title>

<meta name="theme-color" content="#006994">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet"
href="css/style.css">

<link rel="apple-touch-icon"
href="icons/icon-192.png">

</head>


<body>


<header>

<h1>🌊 Southease River Tide</h1>

<p>River Ouse Paddler Guide</p>

</header>



<section class="next">

<h2>Next Tide</h2>

<div id="nextTide">
Loading...
</div>

</section>



<section class="card">

<h2>Today's Tides</h2>

<div id="tides"></div>

</section>



<section class="card">

<h2>River State</h2>

<div id="state">
Loading...
</div>

</section>



<section class="card">

<h2>Manual Update</h2>

<select id="type">

<option value="high">
High Water
</option>

<option value="low">
Low Water
</option>

</select>


<input id="newhaven"
type="time">


<button disabled>
    Add Tide (Coming Soon)
</button>


</section>





<script src="js/tideService.js"></script>
<script src="js/countdown.js"></script>
<script src="js/app.js"></script>


</body>

</html>
